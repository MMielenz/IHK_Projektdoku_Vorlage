extends: default

page:
  size: A4
  margin: [2.5cm, 2cm, 2.5cm, 2cm]
  numbering:
    start-at: 1

running-content:
  start-at: after-toc    

base:
  font-family: Helvetica
  font-size: 11
  line-height: 1.35
  font-color: 333333
  text-align: left

list:
  item-spacing: 2

codespan:
  background-color: f5f5f5
  font-style: bold
  font-family: Helvetica
  font-color: 333333
  border-offset: 2
  border-radius: 2

heading:
  font-family: Helvetica
  font-color: 003366
  font-style: bold
  h2:
    font-size: 22
    break-before: avoid
  h3:
    break-before: avoid

link:
  font-family: Helvetica
  font-color: 0066cc

image:
  caption:
    align: inherit

footer:
  columns: =100%
  recto:
    center:
      content: 'Seite {page-number} von {page-count}'
  verso:
    center:
      content: 'Seite {page-number} von {page-count}'


code:
  font-family: Helvetica
  font-size: 9
  background-color: f5f5f5
  border-radius: 1
  padding: 6
  caption:
    end: bottom
    align: center
  

table:
  align: center
  caption:
    align: center
    end: bottom
  cell:
    padding: [2, 4]


role:
  cent:
    text-align: center
    font-style: bold
    font-size: 11
  big:
    font-style: bold
    font-size: 11
  numb:
    text-align: center
  numbGood:
    text-align: center
    font-color: #1c7800
  numbBad:
    text-align: center
    font-color: #c20202